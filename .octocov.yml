coverage:
  paths:
    - coverage/.resultset.json
codeToTestRatio:
  code:
    - '**/*.rb'
    - '!test/**/*.rb'
    - '!lib/fast_excel/binding/**/*.rb'
    - '!lib/fast_excel/binding.rb'
  test:
    - 'test/**/*_test.rb'
testExecutionTime:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
  deletePrevious: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
timeout: 5min
summary:
  if: true
